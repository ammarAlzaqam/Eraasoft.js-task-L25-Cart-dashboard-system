<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.css'
        integrity='sha512-zylce7fP6h4usg536JBTRj2rt7q22Z0qicHSlgSK53Irtfkz37ate3KCQ59du+aXZV6R3yyL2X1LyGKBEUMZaw=='
        crossorigin='anonymous' />
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css'
        integrity='sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=='
        crossorigin='anonymous' />
    <link rel="stylesheet" href="./index.css">
    <title>Products-Cart-system</title>
</head>

<body>
    <section id="home" class="d-flex col-12" style="height: 100dvh">
        <div class="products col-8 h-100 p-4 overflow-auto">
            <div class="search-wrapper mt-4 mb-3 d-flex align-items-center justify-content-center">
                <input type="text" class="form-control" placeholder="Search product" id="searchInput">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex gap-3">
                    <button class="btn btn-dark" onclick="filterProducts('all')">All</button>
                    <button class="btn btn-dark" onclick="filterProducts('iPhone')">Apple Products</button>
                    <button class="btn btn-dark" onclick="filterProducts('Samsung')">Samsung Products</button>
                    <button class="btn btn-dark" onclick="filterProducts('Oppo')">Oppo Products</button>
                </div>
                <a href="./admin/index.html" class="btn btn-secondary"><i class="fa-solid fa-gauge-high"></i>
                    Dashboard</a>
            </div>

            <div id="productsDiv" class="row g-4"></div>
        </div>
        <div class="cart col-4 h-100 border border-dark shadow overflow-auto">
            <div class="overlay p-4 col-12 h-100">
                <h1 class="mb-3">Your Cart</h1>
                <table class="table table-dark table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Item Name</th>
                            <th>Item Price</th>
                            <th>Item Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cartProductsBody"></tbody>
                    <tfoot>
                        <tr>
                            <td>Total</td>
                            <td colspan="4">$ <span id="totalProductsPrice"></span></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </section>

    <div class="linkToDashboard position-fixed z-3">
        <a href="./admin/index.html"
            class="btn btn-secondary rounded-circle d-flex align-items-center justify-content-center"><i
                class="fa-solid fa-gauge-high"></i></a>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.js'
        integrity='sha512-GKxQGmCBqm3YHCZTdqD3Bvsz+AHRObqztq6xDo+68527RxgVw7wF1TR5ZSBvtWiz5qzpOzUGGvxJbT/6UzzSOQ=='
        crossorigin='anonymous'></script>
    <script src="./data.js"></script>
    <script src="./index.js"></script>
</body>

</html>
