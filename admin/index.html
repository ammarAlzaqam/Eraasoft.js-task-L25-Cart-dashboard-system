<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.css'
        integrity='sha512-zylce7fP6h4usg536JBTRj2rt7q22Z0qicHSlgSK53Irtfkz37ate3KCQ59du+aXZV6R3yyL2X1LyGKBEUMZaw=='
        crossorigin='anonymous' />
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css'
        integrity='sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=='
        crossorigin='anonymous' />
    <style>
        .linkToHome {
            bottom: 1rem;
            right: 1rem;

            a.btn {
                aspect-ratio: 1/1;
                padding: 8px;

                i {
                    font-size: 1.5rem;
                }
            }
        }
    </style>
    <title>Dashboard</title>
</head>

<body>
    <section id="admin" class="mt-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-2">
                    <a href="../index.html">
                        <i class="fa-solid fa-arrow-left fs-5 text-black"></i>
                    </a>
                    <h3>Admin Page</h3>
                </div>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#AddNewProductModal">
                    <i class="fa-solid fa-plus"></i>
                    Add New Product
                </button>
            </div>
            <table class="table table-dark table-striped table-bordered align-middle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Item Name</th>
                        <th>Item Price</th>
                        <th>Item ImgUrl</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </div>
    </section>

    <!--! Add New Product Modal -->
    <div class="modal fade" id="AddNewProductModal" tabindex="-1" aria-labelledby="AddNewProductModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <form onsubmit="addNewProduct(event)" class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="eAddNewProductModalLabel">Add New Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <input class="form-control" required id="productNameInput" placeholder="Enter product name"
                        type="text">
                    <select required id="productBrandInput" class="form-select">
                        <option hidden value="">Select product brand</option>
                        <option value="iPhone">iPhone</option>
                        <option value="Samsung">Samsung</option>
                    </select>
                    <input class="form-control" required id="productPriceInput" placeholder="Enter product price"
                        type="number">
                    <input class="form-control" required id="productImgURLInput" placeholder="Enter product imgURL"
                        type="text">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!--! Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="EditProductModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <form onsubmit="handelEditProduct(event)" class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="EditProductModalLabel">Edit Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <input class="form-control" required id="productNameEditInput" placeholder="Enter product name"
                        type="text">
                    <select required id="productBrandEditInput" class="form-select">
                        <option hidden value="">Select product brand</option>
                        <option value="iPhone">iPhone</option>
                        <option value="Samsung">Samsung</option>
                    </select>
                    <input class="form-control" required id="productPriceEditInput" placeholder="Enter product price"
                        type="number">
                    <input class="form-control" required id="productImgURLEditInput" placeholder="Enter product imgURL"
                        type="text">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>

    <div class="linkToHome position-fixed z-3">
        <a href="../index.html"
            class="btn btn-secondary rounded-circle d-flex align-items-center justify-content-center">
            <i class="fa-regular fa-house"></i>
        </a>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.js'
        integrity='sha512-GKxQGmCBqm3YHCZTdqD3Bvsz+AHRObqztq6xDo+68527RxgVw7wF1TR5ZSBvtWiz5qzpOzUGGvxJbT/6UzzSOQ=='
        crossorigin='anonymous'></script>
    <script src="../data.js"></script>
    <script src="./index.js"></script>
</body>

</html>
